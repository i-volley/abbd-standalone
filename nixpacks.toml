[phases.setup]
nixPkgs = ['php83', 'php83Extensions.pdo_mysql', 'php83Extensions.mbstring',
           'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.zip',
           'php83Extensions.gd', 'php83Extensions.intl', 'php83Extensions.bcmath',
           'nodejs_22', 'npm']

[phases.build]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm ci',
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]

[phases.deploy]
cmds = [
    'php artisan migrate --force',
    'php artisan db:seed --force',
]

[start]
cmd = 'php artisan serve --host=0.0.0.0 --port=$PORT'
